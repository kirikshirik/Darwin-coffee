services:
  darwin-coffee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darwin-coffee
    ports:
      - "8000:8000"
    # Секреты (TELEGRAM_BOT_TOKEN, EVOTOR_CLOUD_TOKEN, DASHBOARD_TOKEN, …) — только
    # в .env (он в .gitignore). НИКОГДА не вписывать токены в этот файл: репозиторий
    # публичный, однажды они уже утекли в историю и пришлось их перевыпускать.
    env_file:
      - .env
    environment:
      # Несекретные настройки (перекрывают .env при совпадении имён)
      PORT: 8000
      TELEGRAM_TZ: Europe/Moscow
      TELEGRAM_REPORT_TIME: "09:00"
      EVOTOR_TZ: Europe/Moscow
      EVOTOR_SYNC_INTERVAL_MIN: "15"
      # DATABASE_URL не задан → локальная SQLite ./darwin.db
      WEBAPP_URL: "http://localhost:8000/app"

    volumes:
      # Сохраняем SQLite БД между рестартами
      - ./data:/app/data
      - ./darwin.db:/app/darwin.db

    # Перезагружаемся при сбое, но не бесконечно
    restart: unless-stopped

