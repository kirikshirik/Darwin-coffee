# Render Blueprint — бесплатный деплой бота «Дарвин».
# Подробный гайд: deploy/RENDER.md
#
# Один free web-сервис держит ВСЁ в одном процессе: Telegram-бот (поллинг),
# планировщик (утренняя сводка + синк Эвотора каждые 15 мин) и health-эндпоинт
# для keepalive. БД — внешний Postgres (Neon), задаётся через DATABASE_URL.
services:
  - type: web
    name: darwin-bot
    runtime: python
    plan: free
    region: frankfurt           # ближайший к РФ free-регион; можно oregon/singapore/...
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && pip install -r requirements.txt
    startCommand: python -m backend.bot.main
    healthCheckPath: /healthz
    envVars:
      # --- секреты: значения вводятся в дашборде Render (sync:false = не в git) ---
      - key: TELEGRAM_BOT_TOKEN      # от @BotFather
        sync: false
      - key: TELEGRAM_OWNER_CHAT_ID  # от @userinfobot — нужен для /dashboard и сводки
        sync: false
      - key: EVOTOR_CLOUD_TOKEN      # можно оставить пустым (демо-режим), вписать позже
        sync: false
      - key: DATABASE_URL            # строка подключения Neon Postgres
        sync: false
      - key: DASHBOARD_TOKEN         # секрет для /dashboard?key=… (пусто = маршрут выключен)
        sync: false
      # --- настройки (можно держать в git) ---
      - key: EVOTOR_SYNC_INTERVAL_MIN  # синк в процессе бота каждые N мин (только при наличии токена)
        value: "15"
      - key: TELEGRAM_TZ
        value: Europe/Moscow
      - key: TELEGRAM_REPORT_TIME
        value: "09:00"
      - key: EVOTOR_TZ
        value: Europe/Moscow
